# render.yaml
services:
  - type: web
    name: budget-tracker-api
    env: python
    region: frankfurt
    plan: free
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r api/requirements.txt --no-cache-dir
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    runtime: python
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: B2_ENDPOINT_URL
        sync: false
      - key: B2_KEY_ID
        sync: false
      - key: B2_APP_KEY
        sync: false
      - key: B2_BUCKET_NAME
        sync: false
      - key: GROQ_API_KEY
        sync: false
